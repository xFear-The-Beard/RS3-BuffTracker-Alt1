# Forces users through one of the templates above instead of opening a blank issue.
blank_issues_enabled: false

contact_links:
  - name: 💡 Suggestions and ideas
    url: https://github.com/xFear-The-Beard/RS3-BuffTracker-Alt1/discussions/categories/ideas
    about: Have an idea but not sure if it's a concrete feature request? Post it in Ideas for discussion first.
  - name: 🙏 Questions and help
    url: https://github.com/xFear-The-Beard/RS3-BuffTracker-Alt1/discussions/categories/q-a
    about: Install help, "is this normal?", "does this work with X?" — anything that doesn't need tracking as work.
  - name: 💬 General feedback or chat
    url: https://github.com/xFear-The-Beard/RS3-BuffTracker-Alt1/discussions
    about: Anything else — screenshots of your setup, casual conversation, or feedback that doesn't fit a template.
